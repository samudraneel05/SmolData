# Default training hyperparameters — override per experiment
# All variants use IDENTICAL hyperparameters unless explicitly ablated

optimizer: adam
lr: 0.002
weight_decay: 0.05
epochs: 100
batch_size: 256
scheduler: cosine
warmup_epochs: 10
clip_grad: 1.0
label_smoothing: 0.1

# Augmentation
mixup_alpha: 0.4
cutmix_alpha: 1.0
mixup_prob: 1.0
mixup_switch_prob: 0.5

# Self-supervised pre-training
ssl_epochs: 200
ssl_lr: 0.0005
ema_momentum: 0.996
dino_out_dim: 65536
n_crops: 8

# Evaluation
seeds: [42, 1337, 2024]
num_eval_samples_cka: 1000

# Compute
num_workers: 4
use_wandb: false
use_amp: true
